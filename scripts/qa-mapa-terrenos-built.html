    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #111; color: #fff; }
    #map { height: 70vh; width: 100%; }
    #sidebar {
      height: 30vh;
      overflow-y: auto;
      padding: 16px;
      background: #1a1a1a;
    }
    #sidebar h2 { font-size: 14px; margin-bottom: 12px; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    .terreno-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 12px;
      margin-bottom: 4px;
      background: #222;
      border-radius: 6px;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all 0.15s;
    }
    .terreno-item:hover { background: #333; border-color: #ea580c; }
    .terreno-item .nombre { font-weight: 600; font-size: 13px; }
    .terreno-item .meta { font-size: 11px; color: #888; }
    .terreno-item .tipo {
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .tipo-polygon { background: #ea580c33; color: #ea580c; }
    .tipo-point { background: #3b82f633; color: #3b82f6; }
    .status { font-size: 11px; color: #666; margin-top: 8px; padding-top: 8px; border-top: 1px solid #333; }
  </style>

    // Mapa con vista satelital (Esri)
    const map = L.map('map', { zoomControl: true }).setView([32.58, -115.40], 11);

    // Capa satelital
    const satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 19,
      attribution: 'Esri'
    });

    // Capa clara (CartoDB)
    const light = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
      subdomains: 'abcd',
      maxZoom: 19,
    });

    // Satelital por defecto
    satellite.addTo(map);
    L.control.layers({ 'Satelital': satellite, 'Claro': light }).addTo(map);

    // Dibujar features
    const layers = {};

    geojson.features.forEach(f => {
      const id = f.properties.id;
      const nombre = f.properties.nombre;
      const tipo = f.geometry.type;

      let layer;
      if (tipo === 'Polygon') {
        layer = L.geoJSON(f, {
          style: {
            color: '#ea580c',
            weight: 3,
            fillColor: '#ea580c',
            fillOpacity: 0.25,
            opacity: 1,
          }
        });
      } else {
        // Point
        const [lng, lat] = f.geometry.coordinates;
        layer = L.circleMarker([lat, lng], {
          radius: 10,
          fillColor: '#3b82f6',
          color: '#ffffff',
          weight: 2,
          opacity: 1,
          fillOpacity: 0.9,
        });
      }

      layer.bindTooltip(nombre, {
        permanent: true,
        direction: 'top',
        className: 'label-tooltip',
      });

      layer.addTo(map);
      layers[id] = layer;
    });

    // Lista en sidebar
    const listEl = document.getElementById('list');
    document.getElementById('count').textContent = geojson.features.length;

    geojson.features.forEach(f => {
      const id = f.properties.id;
      const nombre = f.properties.nombre;
      const clave = f.properties.claveCatastral;
      const tipo = f.geometry.type;

      const div = document.createElement('div');
      div.className = 'terreno-item';
      div.innerHTML = `
        <div>
          <div class="nombre">${nombre}</div>
          <div class="meta">${clave} — ${id}</div>
        </div>
        <span class="tipo ${tipo === 'Polygon' ? 'tipo-polygon' : 'tipo-point'}">${tipo === 'Polygon' ? 'Polígono' : 'Pin'}</span>
      `;
      div.onclick = () => {
        const layer = layers[id];
        if (layer.getBounds) {
          map.fitBounds(layer.getBounds(), { padding: [80, 80], maxZoom: 17 });
        } else {
          map.setView(layer.getLatLng(), 16);
        }
      };
      listEl.appendChild(div);
    });

    // Fit a todos los features
    const allBounds = L.geoJSON(geojson).getBounds();
    map.fitBounds(allBounds, { padding: [30, 30] });
